<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF14 タスクリスト</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;background:#f5f4f0;min-height:100vh;padding:1.5rem 1rem;color:#1a1a1a}
.app{max-width:560px;margin:0 auto}
.header{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem}
.header h1{font-size:20px;font-weight:500;flex:1}
.icon-btn{width:34px;height:34px;border-radius:8px;border:1px solid #d0cfc8;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:#666;transition:background .15s}
.icon-btn:hover{background:#eeede8}
.tabs{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap}
.tab{padding:6px 16px;border-radius:20px;border:1px solid #ccc;font-size:13px;cursor:pointer;background:#fff;color:#666;transition:all .15s}
.tab.active{background:#dbeeff;color:#185fa5;border-color:#a8cef7}
.progress-wrap{margin-bottom:1rem}
.progress-bar{height:6px;border-radius:3px;background:#ddd;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;border-radius:3px;background:#378ADD;transition:width .3s}
.progress-label{font-size:11px;color:#888;display:flex;justify-content:space-between}
.section{margin-bottom:1.25rem}
.section-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer;user-select:none}
.section-title{font-size:14px;font-weight:500;color:#555}
.badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.badge-blue{background:#dbeeff;color:#185fa5}
.badge-amber{background:#fef3d8;color:#854f0b}
.badge-purple{background:#EEEDFE;color:#3C3489}
.badge-pink{background:#FBEAF0;color:#72243E}
.badge-teal{background:#E1F5EE;color:#085041}
.chevron{font-size:11px;color:#aaa;transition:transform .2s;display:inline-block}
.chevron.open{transform:rotate(90deg)}
.task-list{display:flex;flex-direction:column;gap:4px}
.task{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;border:1px solid #e8e7e2;background:#fff;cursor:pointer;transition:background .1s}
.task:hover{background:#f5f4f0}
.task.done{opacity:.45}
.task-check{width:16px;height:16px;border-radius:4px;border:1px solid #ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;color:#0f6e56}
.task.done .task-check{background:#e0f5ec;border-color:#5dcaa5}
.task-label{font-size:13px;flex:1;line-height:1.45}
.task.done .task-label{text-decoration:line-through;color:#aaa}
.task-tag{font-size:10px;padding:2px 6px;border-radius:8px;flex-shrink:0;white-space:nowrap}
.tag-roulette{background:#EEEDFE;color:#3C3489}
.tag-quest{background:#E1F5EE;color:#085041}
.tag-retainer{background:#fef3d8;color:#854f0b}
.tag-sub{background:#E6F1FB;color:#0C447C}
.tag-craft{background:#FAEEDA;color:#633806}
.tag-pvp{background:#FBEAF0;color:#72243E}
.tag-raid{background:#EEEDFE;color:#3C3489}
.reset-btn{font-size:12px;padding:4px 12px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#888;cursor:pointer;margin-left:auto;display:block;margin-top:.5rem}
.reset-btn:hover{background:#f0efea}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;display:none;align-items:flex-start;justify-content:center;padding-top:2rem}
.overlay.open{display:flex}
.settings-panel{background:#fff;border-radius:12px;border:1px solid #ddd;width:100%;max-width:520px;max-height:80vh;display:flex;flex-direction:column;margin:0 1rem}
.settings-header{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid #eee}
.settings-header h2{font-size:16px;font-weight:500;flex:1}
.settings-body{overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:16px}
.settings-tab-label{font-size:12px;font-weight:500;color:#888;margin-bottom:6px;border-bottom:1px solid #eee;padding-bottom:4px}
.settings-section-title{font-size:13px;font-weight:500;color:#555;margin-bottom:6px;padding-left:2px}
.settings-task-row{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:8px}
.settings-task-row:hover{background:#f5f4f0}
.settings-task-label{font-size:13px;flex:1;line-height:1.4}
.toggle{position:relative;width:36px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;border-radius:10px;background:#ccc;cursor:pointer;transition:background .2s}
.toggle input:checked + .toggle-track{background:#378ADD}
.toggle-thumb{position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .2s;pointer-events:none}
.toggle input:checked ~ .toggle-thumb{transform:translateX(16px)}
@media(prefers-color-scheme:dark){
  body{background:#1c1c1a;color:#f0efe8}
  .header h1{color:#f0efe8}
  .icon-btn{background:#2c2c2a;border-color:#444;color:#aaa}
  .icon-btn:hover{background:#3a3a38}
  .tab{background:#2c2c2a;border-color:#444;color:#999}
  .tab.active{background:#0c447c;color:#b5d4f4;border-color:#378ADD}
  .progress-bar{background:#333}
  .task{background:#2c2c2a;border-color:#3a3a38}
  .task:hover{background:#333}
  .task-check{border-color:#555}
  .task.done .task-check{background:#04342C;border-color:#1D9E75}
  .section-title{color:#aaa}
  .reset-btn{background:#2c2c2a;border-color:#444;color:#888}
  .reset-btn:hover{background:#333}
  .settings-panel{background:#2c2c2a;border-color:#444}
  .settings-header{border-bottom-color:#3a3a38}
  .settings-header h2{color:#f0efe8}
  .settings-tab-label{color:#888;border-bottom-color:#3a3a38}
  .settings-section-title{color:#aaa}
  .settings-task-row:hover{background:#333}
  .settings-task-label{color:#e0dfd8}
  .toggle-track{background:#555}
  .tag-roulette{background:#26215C;color:#CECBF6}
  .tag-quest{background:#04342C;color:#9FE1CB}
  .tag-retainer{background:#412402;color:#FAC775}
  .tag-sub{background:#042C53;color:#B5D4F4}
  .tag-craft{background:#412402;color:#FAC775}
  .tag-pvp{background:#4B1528;color:#F4C0D1}
  .tag-raid{background:#26215C;color:#CECBF6}
  .badge-blue{background:#0c447c;color:#b5d4f4}
  .badge-amber{background:#412402;color:#FAC775}
  .badge-purple{background:#26215C;color:#CECBF6}
  .badge-pink{background:#4B1528;color:#F4C0D1}
  .badge-teal{background:#04342C;color:#9FE1CB}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div style="font-size:22px">&#9876;&#65039;</div>
    <h1>FF14 タスクリスト</h1>
    <button class="icon-btn" onclick="openSettings()" title="設定">&#9881;&#65039;</button>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('daily',this)">デイリー</button>
    <button class="tab" onclick="switchTab('weekly',this)">ウィークリー</button>
    <button class="tab" onclick="switchTab('monthly',this)">マンスリー・不定期</button>
  </div>
  <div class="progress-wrap">
    <div class="progress-label">
      <span id="prog-label">進捗</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div id="task-area"></div>
  <button class="reset-btn" onclick="resetTab()">このタブをリセット</button>
  <div class="overlay" id="overlay" onclick="overlayClick(event)">
    <div class="settings-panel">
      <div class="settings-header">
        <span style="font-size:16px">&#9881;&#65039;</span>
        <h2>タスク設定</h2>
        <button class="icon-btn" onclick="closeSettings()" style="border:none;font-size:18px;color:#888">&#10005;</button>
      </div>
      <div class="settings-body" id="settings-body"></div>
    </div>
  </div>
</div>
<script>
var DATA={daily:[{title:"コンテンツルーレット",badge:"badge-purple",tag:"tag-roulette",tagLabel:"ルーレット",tasks:["ルーレット：エキルレ（エキスパート）","ルーレット：レベリング","ルーレット：討滅戦","ルーレット：メインクエスト"]},{title:"デイリークエスト・ハント",badge:"badge-teal",tag:"tag-quest",tagLabel:"クエスト",tasks:["友好部族クエスト（最新パッチ分）","モブハント（デイリーハント）"]},{title:"リテイナー・消費",badge:"badge-amber",tag:"tag-retainer",tagLabel:"リテイナー",tasks:["リテイナーベンチャー（回し・再依頼）","ミニ・くじテンダー","軍票・バイカラージェムの納品/消費（必要時）"]},{title:"サブコンテンツ",badge:"badge-blue",tag:"tag-sub",tagLabel:"サブ",tasks:["無人島開拓：ワーク確認・スケジュール設定","ゴールドソーサー：チョコボレース","ゴールドソーサー：カード","FC活動：1ダンジョン（経験値稼ぎ）"]},{title:"ギャザクラ",badge:"badge-amber",tag:"tag-craft",tagLabel:"ギャザクラ",tasks:["収集品納品・デイリー収集"]},{title:"PvP",badge:"badge-pink",tag:"tag-pvp",tagLabel:"PvP",tasks:["クリスタルコンフリクト（デイリー1戦）","フロントライン（デイリー）"]}],weekly:[{title:"レイド",badge:"badge-purple",tag:"tag-raid",tagLabel:"レイド",tasks:["最新週制限トークンを450貯める（天道など）","零式 1層（断章・箱回収）","零式 2層（断章・箱回収）","零式 3層（断章・箱回収）","零式 4層（断章・箱回収）","ノーマルレイド（週1周：素材・トークン）","幻討滅戦"]},{title:"ウィークリークエスト",badge:"badge-teal",tag:"tag-quest",tagLabel:"クエスト",tasks:["クロの空想帳（スタンプ・提出）","お得意様取引（ギャザクラ貨幣）","ファッションチェック（80点以上）","ドマ町人地復興（換金）","ウィークリーハント（A/S級モブ）"]},{title:"ギャザクラ・経済",badge:"badge-amber",tag:"tag-craft",tagLabel:"ギャザクラ",tasks:["マーケット在庫補充・価格見直し","ギルドリーヴ（週の上限管理）"]},{title:"サブコンテンツ",badge:"badge-blue",tag:"tag-sub",tagLabel:"サブ",tasks:["フィールド探索（ボズヤ/エウレカ/境界戦線等）の進捗確認","無人島：工房週次確認・牧場管理"]}],monthly:[{title:"コンテンツ進捗",badge:"badge-purple",tag:"tag-raid",tagLabel:"コンテンツ",tasks:["最新パッチ制限コンテンツの進捗確認・消化","最新レイド木人打ち（スキル回し確認）","マウント・ミニオン・称号の収集進捗チェック","ハントログ・モブノート進捗確認"]},{title:"ギャザクラ",badge:"badge-amber",tag:"tag-craft",tagLabel:"ギャザクラ",tasks:["マスターレシピ習得・装備更新検討","素材・ストック棚卸し（リテイナー整理）"]},{title:"サブコンテンツ",badge:"badge-blue",tag:"tag-sub",tagLabel:"サブ",tasks:["ゴールドソーサー：シーズンイベント参加","ゴールドソーサー：月次イベント参加","ハウジング：インテリア整備・庭いじり","FCランキング・イベント確認"]},{title:"PvP",badge:"badge-pink",tag:"tag-pvp",tagLabel:"PvP",tasks:["シリーズ報酬確認・目標設定"]}]};

var currentTab="daily",state={},disabled={},collapsed={};

function load(){
  try{state=JSON.parse(localStorage.getItem("ff14_state")||"{}");}catch(e){state={};}
  try{disabled=JSON.parse(localStorage.getItem("ff14_disabled")||"{}");}catch(e){disabled={};}
}
function save(){
  try{localStorage.setItem("ff14_state",JSON.stringify(state));}catch(e){}
  try{localStorage.setItem("ff14_disabled",JSON.stringify(disabled));}catch(e){}
}
function ck(tab,si,ti){return tab+"_"+si+"_"+ti;}
function dk(tab,si,ti){return "dis_"+tab+"_"+si+"_"+ti;}
function isEnabled(tab,si,ti){return disabled[dk(tab,si,ti)]!==true;}

function render(){
  var sections=DATA[currentTab],total=0,done=0;
  sections.forEach(function(s,si){s.tasks.forEach(function(t,ti){if(!isEnabled(currentTab,si,ti))return;total++;if(state[ck(currentTab,si,ti)])done++;});});
  var pct=total?Math.round(done/total*100):0;
  document.getElementById("prog-label").textContent=done+" / "+total+" 完了";
  document.getElementById("prog-pct").textContent=pct+"%";
  document.getElementById("prog-fill").style.width=pct+"%";
  var html="";
  sections.forEach(function(s,si){
    var vis=s.tasks.filter(function(t,ti){return isEnabled(currentTab,si,ti);}).length;
    if(!vis)return;
    var sdone=0;
    s.tasks.forEach(function(t,ti){if(isEnabled(currentTab,si,ti)&&state[ck(currentTab,si,ti)])sdone++;});
    var open=collapsed[currentTab+"_"+si]!==false;
    html+="<div class=\"section\">";
    html+="<div class=\"section-header\" onclick=\"toggleSection('"+currentTab+"',"+si+")\">";
    html+="<span class=\"chevron "+(open?"open":"")+"\">&gt;</span>";
    html+="<span class=\"section-title\">"+s.title+"</span>";
    html+="<span class=\"badge "+s.badge+"\">"+sdone+"/"+vis+"</span>";
    html+="</div>";
    html+="<div class=\"task-list\" style=\"display:"+(open?"flex":"none")+"\">";
    s.tasks.forEach(function(t,ti){
      if(!isEnabled(currentTab,si,ti))return;
      var k=ck(currentTab,si,ti),isDone=!!state[k];
      html+="<div class=\"task "+(isDone?"done":"")+"\" onclick=\"toggle('"+k+"')\">";
      html+="<div class=\"task-check\">"+(isDone?"&#10003;":"")+"</div>";
      html+="<span class=\"task-label\">"+t+"</span>";
      html+="<span class=\"task-tag "+s.tag+"\">"+s.tagLabel+"</span>";
      html+="</div>";
    });
    html+="</div></div>";
  });
  document.getElementById("task-area").innerHTML=html;
}

function toggle(k){state[k]=!state[k];save();render();}
function toggleSection(tab,si){var k=tab+"_"+si;collapsed[k]=collapsed[k]===false?true:false;render();}
function switchTab(tab,btn){currentTab=tab;document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active");});btn.classList.add("active");render();}
function resetTab(){var label=currentTab==="daily"?"デイリー":currentTab==="weekly"?"ウィークリー":"マンスリー・不定期";if(!confirm(label+"のチェックをリセットしますか？"))return;DATA[currentTab].forEach(function(s,si){s.tasks.forEach(function(t,ti){delete state[ck(currentTab,si,ti)];});});save();render();}
function openSettings(){renderSettings();document.getElementById("overlay").classList.add("open");}
function closeSettings(){save();document.getElementById("overlay").classList.remove("open");render();}
function overlayClick(e){if(e.target===document.getElementById("overlay"))closeSettings();}

function renderSettings(){
  var tabs=["daily","weekly","monthly"],labels={daily:"デイリー",weekly:"ウィークリー",monthly:"マンスリー・不定期"};
  var html="";
  tabs.forEach(function(tab){
    html+="<div><div class=\"settings-tab-label\">"+labels[tab]+"</div>";
    DATA[tab].forEach(function(s,si){
      html+="<div><div class=\"settings-section-title\">"+s.title+"</div>";
      s.tasks.forEach(function(t,ti){
        var k=dk(tab,si,ti),on=isEnabled(tab,si,ti);
        html+="<div class=\"settings-task-row\">";
        html+="<span class=\"settings-task-label\">"+t+"</span>";
        html+="<label class=\"toggle\">";
        html+="<input type=\"checkbox\" "+(on?"checked":"")+" onchange=\"toggleDisabled('"+k+"')\">";
        html+="<div class=\"toggle-track\"></div><div class=\"toggle-thumb\"></div>";
        html+="</label></div>";
      });
      html+="</div>";
    });
    html+="</div>";
  });
  document.getElementById("settings-body").innerHTML=html;
}

function toggleDisabled(k){
  disabled[k]=(disabled[k]===true)?false:true;
  save();
}

load();render();
</script>
</body>
</html>
