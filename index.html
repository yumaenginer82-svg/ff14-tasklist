<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF14 タスクリスト</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Zen Maru Gothic',-apple-system,sans-serif;
  background:#0d0d14;
  color:#e8e6f0;
  min-height:100vh;
  padding:1.5rem 1rem;
  background-image:
    radial-gradient(circle at 15% 20%,rgba(155,100,255,0.07) 0%,transparent 45%),
    radial-gradient(circle at 85% 70%,rgba(255,100,180,0.06) 0%,transparent 45%);
}
.app{max-width:560px;margin:0 auto}

/* ヘッダー */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.title-wrap{display:flex;align-items:center;gap:8px}
.star{font-size:14px;animation:twinkle 2s ease-in-out infinite}
.star:nth-child(3){animation-delay:0.7s}
@keyframes twinkle{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)}}
h1{
  font-size:20px;font-weight:700;
  background:linear-gradient(90deg,#c084fc,#f472b6,#fb923c);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:0.02em;
}
.subtitle{font-size:12px;color:#3a3650;margin-bottom:1.5rem;margin-top:2px}
.gear-btn{
  background:none;border:none;cursor:pointer;
  padding:6px;color:#5a5870;
  display:flex;align-items:center;justify-content:center;
  border-radius:8px;transition:color 0.15s,background 0.15s;
}
.gear-btn:hover{color:#c084fc;background:#1e1a2e}
.gear-btn svg{width:20px;height:20px}

/* タブ */
.tabs{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap}
.tab{
  padding:6px 16px;border-radius:20px;
  border:1px solid #2a2440;
  font-size:13px;font-weight:500;cursor:pointer;
  background:#15121f;color:#5a5870;
  transition:all .2s;font-family:inherit;
}
.tab:hover{border-color:#4a3a60;color:#a78bfa}
.tab.active{
  background:linear-gradient(90deg,#4f46e5,#7c3aed);
  color:#e0d7ff;border-color:transparent;
}

/* プログレス */
.progress-wrap{margin-bottom:1.25rem}
.progress-label{font-size:11px;color:#3a3650;display:flex;justify-content:space-between;margin-bottom:5px;letter-spacing:0.05em}
.progress-label span:last-child{color:#a78bfa;font-weight:700}
.progress-bar{height:4px;border-radius:2px;background:#1e1a2e;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#818cf8,#c084fc,#f472b6);transition:width .4s}

/* セクション */
.section{margin-bottom:1rem}
.section-header{
  display:flex;align-items:center;gap:8px;
  margin-bottom:6px;cursor:pointer;user-select:none;
  padding:2px 0;
}
.section-title{
  font-size:11px;font-weight:700;letter-spacing:0.1em;
  color:#3a3650;text-transform:uppercase;flex:1;
}
.badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:700}
.badge-purple{background:#2a1a4a;color:#c084fc;border:1px solid #4a2a7a}
.badge-teal{background:#0a2a20;color:#34d399;border:1px solid #0a4a30}
.badge-amber{background:#2a1a0a;color:#fbbf24;border:1px solid #4a2a0a}
.badge-blue{background:#0a1a3a;color:#818cf8;border:1px solid #1a2a5a}
.badge-pink{background:#2a0a1a;color:#f472b6;border:1px solid #4a1a2a}
.chevron{font-size:10px;color:#3a3650;transition:transform .2s;display:inline-block}
.chevron.open{transform:rotate(90deg)}

/* タスク */
.task-list{display:flex;flex-direction:column;gap:4px}
.task{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:12px;
  border:1px solid #2a2440;background:#15121f;
  cursor:pointer;transition:border-color .15s,background .15s;
}
.task:hover{border-color:#4a3a60;background:#1a1430}
.task.done{opacity:.35}
.task-check{
  width:16px;height:16px;border-radius:4px;
  border:1px solid #3a3050;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:10px;transition:all .15s;
}
.task.done .task-check{background:linear-gradient(135deg,#4f46e5,#7c3aed);border-color:#7c3aed;color:#e0d7ff}
.task-label{font-size:13px;flex:1;line-height:1.45;color:#c8c4e0}
.task.done .task-label{text-decoration:line-through;color:#3a3650}
.task-tag{font-size:10px;padding:2px 7px;border-radius:8px;flex-shrink:0;white-space:nowrap;font-weight:700}
.tag-roulette{background:#2a1a4a;color:#c084fc}
.tag-quest{background:#0a2a20;color:#34d399}
.tag-retainer{background:#2a1a0a;color:#fbbf24}
.tag-sub{background:#0a1a3a;color:#818cf8}
.tag-craft{background:#2a1500;color:#fb923c}
.tag-pvp{background:#2a0a1a;color:#f472b6}
.tag-raid{background:#2a1a4a;color:#c084fc}

/* リセットボタン */
.reset-btn{
  font-size:12px;padding:5px 14px;border-radius:10px;
  border:1px solid #2a2440;background:#15121f;
  color:#3a3650;cursor:pointer;margin-left:auto;display:block;margin-top:.75rem;
  font-family:inherit;transition:color .15s,border-color .15s;
}
.reset-btn:hover{color:#f472b6;border-color:#4a1a2a}

/* オーバーレイ・設定パネル */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.7);z-index:100;
  align-items:flex-start;justify-content:center;padding-top:2rem;
}
.overlay.open{display:flex}
.settings-panel{
  background:#15121f;border:1px solid #2a2440;
  border-radius:16px;width:100%;max-width:520px;
  max-height:80vh;display:flex;flex-direction:column;
  margin:0 1rem;box-shadow:0 8px 32px rgba(0,0,0,0.5);
}
.settings-header{
  display:flex;align-items:center;gap:8px;
  padding:12px 16px;
  border-bottom:1px solid #2a2440;
  background:linear-gradient(90deg,rgba(129,140,248,0.08),rgba(196,132,252,0.08));
}
.settings-header-title{font-size:15px;font-weight:700;color:#c084fc;flex:1}
.settings-close{background:none;border:none;cursor:pointer;color:#5a5870;font-size:20px;line-height:1;font-family:inherit}
.settings-close:hover{color:#e8e6f0}
.settings-body{overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:16px}
.settings-tab-label{
  font-size:11px;font-weight:700;letter-spacing:0.1em;
  color:#3a3650;text-transform:uppercase;
  margin-bottom:8px;border-bottom:1px solid #2a2440;padding-bottom:6px;
}
.settings-section-title{font-size:13px;font-weight:700;color:#5a5870;margin-bottom:6px;padding-left:2px}
.settings-task-row{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:10px}
.settings-task-row:hover{background:#1e1a2e}
.settings-task-label{font-size:13px;flex:1;line-height:1.4;color:#c8c4e0}
/* トグル */
.toggle{position:relative;width:36px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;border-radius:10px;background:#2a2440;cursor:pointer;transition:background .2s}
.toggle input:checked + .toggle-track{background:linear-gradient(90deg,#4f46e5,#7c3aed)}
.toggle-thumb{position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .2s;pointer-events:none}
.toggle input:checked ~ .toggle-thumb{transform:translateX(16px)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="title-wrap">
      <span class="star">✦</span>
      <h1>FF14 タスクリスト</h1>
      <span class="star">✦</span>
    </div>
    <button class="gear-btn" onclick="openSettings()" title="設定">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>
  <div class="subtitle">デイリー / ウィークリー / マンスリーをこなそう</div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('daily',this)">デイリー</button>
    <button class="tab" onclick="switchTab('weekly',this)">ウィークリー</button>
    <button class="tab" onclick="switchTab('monthly',this)">マンスリー・不定期</button>
  </div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span id="prog-label">進捗</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <div id="task-area"></div>
  <button class="reset-btn" onclick="resetTab()">このタブをリセット</button>

  <div class="overlay" id="overlay" onclick="overlayClick(event)">
    <div class="settings-panel">
      <div class="settings-header">
        <span class="settings-header-title">⚙ タスク設定</span>
        <button class="settings-close" onclick="closeSettings()">✕</button>
      </div>
      <div class="settings-body" id="settings-body"></div>
    </div>
  </div>
</div>
<script>
var DATA={daily:[{title:"コンテンツルーレット",badge:"badge-purple",tag:"tag-roulette",tagLabel:"ルーレット",tasks:["ルーレット：エキルレ（エキスパート）","ルーレット：レベリング","ルーレット：討滅戦","ルーレット：メインクエスト"]},{title:"デイリークエスト・ハント",badge:"badge-teal",tag:"tag-quest",tagLabel:"クエスト",tasks:["友好部族クエスト（最新パッチ分）","モブハント（デイリーハント）"]},{title:"リテイナー・消費",badge:"badge-amber",tag:"tag-retainer",tagLabel:"リテイナー",tasks:["リテイナーベンチャー（回し・再依頼）","ミニ・くじテンダー","軍票・バイカラージェムの納品/消費（必要時）"]},{title:"サブコンテンツ",badge:"badge-blue",tag:"tag-sub",tagLabel:"サブ",tasks:["無人島開拓：ワーク確認・スケジュール設定","ゴールドソーサー：チョコボレース","ゴールドソーサー：カード","FC活動：1ダンジョン（経験値稼ぎ）"]},{title:"ギャザクラ",badge:"badge-amber",tag:"tag-craft",tagLabel:"ギャザクラ",tasks:["収集品納品・デイリー収集"]},{title:"PvP",badge:"badge-pink",tag:"tag-pvp",tagLabel:"PvP",tasks:["クリスタルコンフリクト（デイリー1戦）","フロントライン（デイリー）"]}],weekly:[{title:"レイド",badge:"badge-purple",tag:"tag-raid",tagLabel:"レイド",tasks:["最新週制限トークンを450貯める（天道など）","零式 1層（断章・箱回収）","零式 2層（断章・箱回収）","零式 3層（断章・箱回収）","零式 4層（断章・箱回収）","ノーマルレイド（週1周：素材・トークン）","幻討滅戦"]},{title:"ウィークリークエスト",badge:"badge-teal",tag:"tag-quest",tagLabel:"クエスト",tasks:["クロの空想帳（スタンプ・提出）","お得意様取引（ギャザクラ貨幣）","ファッションチェック（80点以上）","ドマ町人地復興（換金）","ウィークリーハント（A/S級モブ）"]},{title:"ギャザクラ・経済",badge:"badge-amber",tag:"tag-craft",tagLabel:"ギャザクラ",tasks:["マーケット在庫補充・価格見直し","ギルドリーヴ（週の上限管理）"]},{title:"サブコンテンツ",badge:"badge-blue",tag:"tag-sub",tagLabel:"サブ",tasks:["フィールド探索（ボズヤ/エウレカ/境界戦線等）の進捗確認","無人島：工房週次確認・牧場管理"]}],monthly:[{title:"コンテンツ進捗",badge:"badge-purple",tag:"tag-raid",tagLabel:"コンテンツ",tasks:["最新パッチ制限コンテンツの進捗確認・消化","最新レイド木人打ち（スキル回し確認）","マウント・ミニオン・称号の収集進捗チェック","ハントログ・モブノート進捗確認"]},{title:"ギャザクラ",badge:"badge-amber",tag:"tag-craft",tagLabel:"ギャザクラ",tasks:["マスターレシピ習得・装備更新検討","素材・ストック棚卸し（リテイナー整理）"]},{title:"サブコンテンツ",badge:"badge-blue",tag:"tag-sub",tagLabel:"サブ",tasks:["ゴールドソーサー：シーズンイベント参加","ゴールドソーサー：月次イベント参加","ハウジング：インテリア整備・庭いじり","FCランキング・イベント確認"]},{title:"PvP",badge:"badge-pink",tag:"tag-pvp",tagLabel:"PvP",tasks:["シリーズ報酬確認・目標設定"]}]};

var currentTab="daily",state={},disabled={},collapsed={};
function load(){try{state=JSON.parse(localStorage.getItem("ff14_state")||"{}");}catch(e){state={};}try{disabled=JSON.parse(localStorage.getItem("ff14_disabled")||"{}");}catch(e){disabled={};}}
function save(){try{localStorage.setItem("ff14_state",JSON.stringify(state));}catch(e){}try{localStorage.setItem("ff14_disabled",JSON.stringify(disabled));}catch(e){}}
function ck(tab,si,ti){return tab+"_"+si+"_"+ti;}
function dk(tab,si,ti){return "dis_"+tab+"_"+si+"_"+ti;}
function isEnabled(tab,si,ti){return disabled[dk(tab,si,ti)]!==true;}

function render(){
  var sections=DATA[currentTab],total=0,done=0;
  sections.forEach(function(s,si){s.tasks.forEach(function(t,ti){if(!isEnabled(currentTab,si,ti))return;total++;if(state[ck(currentTab,si,ti)])done++;});});
  var pct=total?Math.round(done/total*100):0;
  document.getElementById("prog-label").textContent=done+" / "+total+" 完了";
  document.getElementById("prog-pct").textContent=pct+"%";
  document.getElementById("prog-fill").style.width=pct+"%";
  var html="";
  sections.forEach(function(s,si){
    var vis=s.tasks.filter(function(t,ti){return isEnabled(currentTab,si,ti);}).length;
    if(!vis)return;
    var sdone=0;
    s.tasks.forEach(function(t,ti){if(isEnabled(currentTab,si,ti)&&state[ck(currentTab,si,ti)])sdone++;});
    var open=collapsed[currentTab+"_"+si]!==false;
    html+='<div class="section">';
    html+='<div class="section-header" onclick="toggleSection(\''+currentTab+'\','+si+')">';
    html+='<span class="chevron '+(open?"open":"")+'">&#9658;</span>';
    html+='<span class="section-title">'+s.title+'</span>';
    html+='<span class="badge '+s.badge+'">'+sdone+"/"+vis+'</span>';
    html+='</div>';
    html+='<div class="task-list" style="display:'+(open?"flex":"none")+'">';
    s.tasks.forEach(function(t,ti){
      if(!isEnabled(currentTab,si,ti))return;
      var k=ck(currentTab,si,ti),isDone=!!state[k];
      html+='<div class="task '+(isDone?"done":"")+ '" onclick="toggle(\''+k+'\')">';
      html+='<div class="task-check">'+(isDone?"&#10003;":"")+'</div>';
      html+='<span class="task-label">'+t+'</span>';
      html+='<span class="task-tag '+s.tag+'">'+s.tagLabel+'</span>';
      html+='</div>';
    });
    html+='</div></div>';
  });
  document.getElementById("task-area").innerHTML=html;
}

function toggle(k){state[k]=!state[k];save();render();}
function toggleSection(tab,si){var k=tab+"_"+si;collapsed[k]=collapsed[k]===false?true:false;render();}
function switchTab(tab,btn){currentTab=tab;document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active");});btn.classList.add("active");render();}
function resetTab(){var label=currentTab==="daily"?"デイリー":currentTab==="weekly"?"ウィークリー":"マンスリー・不定期";if(!confirm(label+"のチェックをリセットしますか？"))return;DATA[currentTab].forEach(function(s,si){s.tasks.forEach(function(t,ti){delete state[ck(currentTab,si,ti)];});});save();render();}
function openSettings(){renderSettings();document.getElementById("overlay").classList.add("open");}
function closeSettings(){save();document.getElementById("overlay").classList.remove("open");render();}
function overlayClick(e){if(e.target===document.getElementById("overlay"))closeSettings();}
function renderSettings(){
  var tabs=["daily","weekly","monthly"],labels={daily:"デイリー",weekly:"ウィークリー",monthly:"マンスリー・不定期"};
  var html="";
  tabs.forEach(function(tab){
    html+='<div><div class="settings-tab-label">'+labels[tab]+'</div>';
    DATA[tab].forEach(function(s,si){
      html+='<div><div class="settings-section-title">'+s.title+'</div>';
      s.tasks.forEach(function(t,ti){
        var k=dk(tab,si,ti),on=isEnabled(tab,si,ti);
        html+='<div class="settings-task-row">';
        html+='<span class="settings-task-label">'+t+'</span>';
        html+='<label class="toggle">';
        html+='<input type="checkbox" '+(on?"checked":"")+" onchange=\"toggleDisabled('"+k+"')\">";
        html+='<div class="toggle-track"></div><div class="toggle-thumb"></div>';
        html+='</label></div>';
      });
      html+='</div>';
    });
    html+='</div>';
  });
  document.getElementById("settings-body").innerHTML=html;
}
function toggleDisabled(k){disabled[k]=(disabled[k]===true)?false:true;save();}
load();render();
</script>
</body>
</html>
